services:
  mongo:
    image: mongo:7
    container_name: mongo_module165
    attach: false
    volumes:
      - mongo_data:/data/db
      - ../1_open_data_Ferreira_Bento_Macuacua.json:/docker-entrypoint-initdb.d/open_data.json:ro
      - ../1_my_team_Ferreira_Bento_Macuacua.json:/docker-entrypoint-initdb.d/my_team.json:ro
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro

  app:
    build: .
    container_name: app_module165_pokemon
    ports:
      - "${APP_PORT:-5001}:5001"
    environment:
      MONGO_URI: "mongodb://mongo:27017/"
      MONGO_DB: "my_data_Ferreira_Bento_Macuacua"
      MONGO_COLLECTION: "open_data"
      PUBLIC_PORT: "${APP_PORT:-5001}"
      PYTHONUNBUFFERED: "1"
    depends_on:
      - mongo

volumes:
  mongo_data:
